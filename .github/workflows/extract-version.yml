name: Extract Version

on:
  workflow_dispatch:
    inputs:
      deb_url:
        description: "QQ .deb download URL"
        required: true

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download and extract QQ .deb
        run: |
          curl -sL -o /tmp/qq.deb "${{ inputs.deb_url }}"
          mkdir -p /tmp/qq-extract
          dpkg-deb -x /tmp/qq.deb /tmp/qq-extract

      - name: Detect version
        id: detect
        run: |
          APP=/tmp/qq-extract/opt/QQ/resources/app
          VERSION=$(python3 -c "import json; print(json.load(open('$APP/package.json'))['version'])")
          PLATFORM=$(python3 -c "import json; print(json.load(open('$APP/package.json'))['platform'])")
          ARCH=$(python3 -c "import json; print(json.load(open('$APP/package.json'))['eleArch'])")
          APPID=$(python3 -c "import json; print(json.load(open('$APP/package.json'))['appid']['linux'])")
          KEY="${PLATFORM}-${ARCH}/${VERSION}"
          OFFSET=$(python3 scripts/extract_sign_offset.py "$APP/wrapper.node")
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "offset=${OFFSET}" >> "$GITHUB_OUTPUT"
          echo "appid=${APPID}" >> "$GITHUB_OUTPUT"
          echo "Detected: ${KEY} offset=${OFFSET} appid=${APPID}"

      - name: Generate version JSON and update index
        run: |
          KEY="${{ steps.detect.outputs.key }}"
          VERSION="${{ steps.detect.outputs.version }}"
          OFFSET="${{ steps.detect.outputs.offset }}"
          APPID="${{ steps.detect.outputs.appid }}"
          CLIENT_VER="${VERSION##*-}"

          mkdir -p "versions/$(dirname "$KEY")"
          python3 -c "
          import json, sys
          data = {
              'wrapper': {'sign_offset': sys.argv[1]},
              'appinfo': {
                  'Os': 'Linux', 'Kernel': 'Linux', 'VendorOs': 'linux',
                  'CurrentVersion': sys.argv[2], 'MiscBitmap': 32764,
                  'PtVersion': '2.0.0', 'SsoVersion': 19,
                  'PackageName': 'com.tencent.qq', 'WtLoginSdk': 'nt.wtlogin.0.0.1',
                  'AppId': 1600001615, 'SubAppId': int(sys.argv[5]),
                  'AppClientVersion': int(sys.argv[3]),
                  'MainSigMap': 169742560, 'SubSigMap': 0, 'NTLoginType': 1
              }
          }
          json.dump(data, open(sys.argv[4], 'w'), indent=2)
          " "$OFFSET" "$VERSION" "$CLIENT_VER" "versions/${KEY}.json" "$APPID"

          python3 -c "
          import json, sys
          try:
              idx = json.load(open('versions/index.json'))
          except:
              idx = {}
          idx[sys.argv[1]] = {'file': sys.argv[2]}
          json.dump(idx, open('versions/index.json', 'w'), indent=2)
          " "$KEY" "${KEY}.json"

      - name: Commit and push
        run: |
          git add versions/
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "extract version ${{ steps.detect.outputs.key }}"
            git push
          else
            echo "No changes, version already exists"
          fi
