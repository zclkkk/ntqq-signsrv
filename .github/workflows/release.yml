name: Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Compile stub
        run: gcc -shared -fPIC -o libsymbols.so stubs/symbols.c

      - name: Package
        id: package
        run: |
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          NAME="ntqq-signsrv-${TIMESTAMP}"
          DIR=ntqq-signsrv-linux-x64
          mkdir "$DIR"
          cp target/release/ntqq-signsrv "$DIR/"
          cp libsymbols.so "$DIR/"
          cp config.toml "$DIR/"
          cp -r versions "$DIR/"
          tar czf "${NAME}-linux-x64.tar.gz" "$DIR"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.package.outputs.name }}
          tag_name: ${{ steps.package.outputs.name }}
          files: ${{ steps.package.outputs.name }}-linux-x64.tar.gz
